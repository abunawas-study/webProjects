<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interest Rate Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Interest Rate Calculator</h1>
        <div class="forms">
            <label for="Principle">Principle Amount:</label>
            <input type="number" name="principle" id="Principle" placeholder="Enter principle amount">
        </div>

        <div class="forms">
            <label for="interestRate">Interest Rate:</label>
            <input type="number" name="interestRate" id="interestRate" placeholder="Enter interest rate">
        </div>

        <div class="forms">
            <label for="time">Time (years):</label>
            <input type="number" name="time" id="time" placeholder="Enter time in years">
        </div>
        <button id="calculateBtn" class="calculate-btn">Calculate</button>
        <div id="result" class="result"></div>

    </div>
    
    <script src="script.js"></script>
</body>
</html>
